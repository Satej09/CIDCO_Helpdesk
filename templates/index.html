<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CIDCO Unified Helpdesk</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="static/style.css"/>
</head>
<body>

<div class="wrapper">
  
  <div class="header">
    <div class="logo">🏛️</div>
    <div class="header-text">
      <h1>CIDCO Unified Helpdesk</h1>
      <p>City & Industrial Development Corporation</p>
    </div>
    <div class="status-dot">
      <div class="dot"></div> Online
    </div>
  </div>

  
  <div id="chat"></div>

  <div class="input-area">
    <input id="userInput" type="text" placeholder="Type your name or choose an option…" autocomplete="off"/>
    <button id="sendBtn">➤</button>
  </div>
</div>

<script src="static/script.js"></script>
</body>
</html>
